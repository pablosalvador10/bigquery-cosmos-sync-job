name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: python (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - py/apps/bq-cosmos-sync
          - py/libs/bigquerykit
          - py/libs/cosmosdbkit
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: install python
        run: uv python install 3.12

      - name: sync
        run: uv sync --project ${{ matrix.package }}

      - name: ruff
        working-directory: ${{ matrix.package }}
        run: uv run ruff check src tests

      - name: ruff format check
        working-directory: ${{ matrix.package }}
        run: uv run ruff format --check src tests

      - name: pyright
        working-directory: ${{ matrix.package }}
        run: uv run pyright

      - name: pytest
        working-directory: ${{ matrix.package }}
        run: uv run pytest -q

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: fmt
        run: terraform fmt -check -recursive

      - name: init (no backend)
        run: terraform init -backend=false

      - name: validate
        run: terraform validate
