services:
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: bqcosmos-emulator
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "5"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 5s
      timeout: 5s
      retries: 30

  sync:
    build:
      context: .
      dockerfile: py/apps/bq-cosmos-sync/Dockerfile
    container_name: bqcosmos-sync
    env_file: .env
    environment:
      COSMOS_ENDPOINT: https://cosmos-emulator:8081/
      # Local-emulator-only escape hatch. Production uses Microsoft Entra ID;
      # the Cosmos account ships with local_authentication_disabled = true.
      COSMOS_EMULATOR_KEY: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      COSMOS_VERIFY_TLS: "false"
    volumes:
      - ./.secrets:/secrets:ro    # mount GCP service account JSON here
    depends_on:
      cosmos-emulator:
        condition: service_healthy
    command: ["python", "-m", "bq_cosmos_sync", "run"]
